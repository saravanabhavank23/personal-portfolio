<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task ManagerX</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Auth Page -->
  <div id="authContainer" class="auth-page">
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Task ManagerX</h1>
          <p>Organize your tasks, boost your productivity</p>
        </div>
        
        <!-- Signup Form -->
        <div id="signupForm" class="form-section active">
          <h2>Create Account</h2>
          <form onsubmit="handleSignup(event)">
            <div class="form-group">
              <label for="signupName">Full Name</label>
              <input type="text" id="signupName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label for="signupEmail">Email Address</label>
              <input type="email" id="signupEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label for="signupPassword">Password</label>
              <input type="password" id="signupPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
          </form>
          <p class="form-toggle">Have an account? <a href="#" onclick="toggleForm(event)">Login</a></p>
          <div id="signupMessage" class="message"></div>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-section">
          <h2>Welcome Back</h2>
          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="loginEmail">Email Address</label>
              <input type="email" id="loginEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          <p class="form-toggle">New here? <a href="#" onclick="toggleForm(event)">Sign Up</a></p>
          <div id="loginMessage" class="message"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dashboard Page -->
  <div id="dashboardContainer" class="dashboard-page" style="display: none;">
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-brand">
          <h1>Task ManagerX</h1>
        </div>
        <div class="nav-user">
          <span id="userName">User</span>
          <button onclick="handleLogout()" class="btn btn-logout">Logout</button>
        </div>
      </div>
    </nav>

    <div class="dashboard-container">
      <!-- Create Task Section -->
      <div class="create-task-section">
        <div class="section-card">
          <h2>✨ Create New Task</h2>
          <form onsubmit="handleCreateTask(event)">
            <div class="form-group">
              <label for="taskTitle">Task Title</label>
              <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
            </div>
            <div class="form-group">
              <label for="taskDescription">Description</label>
              <textarea id="taskDescription" placeholder="Add task details..." rows="3"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="taskPriority">Priority</label>
                <select id="taskPriority">
                  <option value="low">🟢 Low</option>
                  <option value="medium" selected>🟡 Medium</option>
                  <option value="high">🔴 High</option>
                </select>
              </div>
              <div class="form-group">
                <label for="taskDueDate">Due Date</label>
                <input type="date" id="taskDueDate">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Add Task</button>
            <div id="createMessage" class="message"></div>
          </form>
        </div>
      </div>

      <!-- Task List Section -->
      <div class="tasks-section">
        <div class="section-card">
          <h2>📋 Your Tasks</h2>
          <div id="tasksList" class="tasks-grid">
            <div class="loading">Loading your tasks...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Task Modal -->
  <div id="editModal" class="modal">
    <div class="modal-overlay" onclick="closeEditModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Task</h2>
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <form onsubmit="handleUpdateTask(event)">
        <div class="form-group">
          <label for="editTaskTitle">Task Title</label>
          <input type="text" id="editTaskTitle" required>
        </div>
        <div class="form-group">
          <label for="editTaskDescription">Description</label>
          <textarea id="editTaskDescription" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="editTaskStatus">Status</label>
            <select id="editTaskStatus">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editTaskPriority">Priority</label>
            <select id="editTaskPriority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="editTaskDueDate">Due Date</label>
          <input type="date" id="editTaskDueDate">
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
        </div>
        <div id="editMessage" class="message"></div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tasks.js"></script>
</body>
</html>
